<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✞ William Josue Cabrera Barrios ✞</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin: 0;
            padding: 0;
            display: block;
            text-align: center;
        }
        .wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: normal;
            letter-spacing: 2px;
            line-height: 1.4;
        }
        .video-box {
            border: 1px solid #ffffff;
            background-color: #0a0a0a;
            padding: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            margin: 0 auto;
            display: inline-block;
            max-width: 100%; 
        }
        video {
            display: block;
            max-width: 100%;
            height: auto;
            width: 280px; 
        }
        
        /* 📱 AJUSTES ESPECIALES PARA CELULARES */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem; 
                margin-bottom: 30px;
                letter-spacing: 1px;
            }
            .wrapper {
                padding: 20px 15px; 
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h1>✞ William Josue Cabrera Barrios ✞</h1>
            
            <div class="video-box">
                <!-- Se retiró el autoplay para que inicie con sonido solo al darle Play -->
                <video controls>
                    <source src="video.mp4" type="video/mp4">
                    Tu navegador no soporta la reproducción de video.
                </video>
            </div>
            
        </div>
    </div>
</body>
</html>
